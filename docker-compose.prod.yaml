services:
  frontend:
    image: ablebil/serabutin-jenkins-pal:latest
    container_name: serabutin-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
